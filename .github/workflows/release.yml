name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 – Electron desktop builds (native runner per platform)
  # ────────────────────────────────────────────────────────────────────────────
  electron:
    name: Electron – ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            script: electron:build:mac
            artifact-name: electron-macos
            artifact-path: dist-electron/*.dmg

          - platform: Windows
            os: windows-latest
            script: electron:build:win
            artifact-name: electron-windows
            artifact-path: dist-electron/*Setup*.exe

          - platform: Linux
            os: ubuntu-latest
            script: electron:build:linux
            artifact-name: electron-linux
            artifact-path: |
              dist-electron/*.deb
              dist-electron/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run ${{ matrix.script }}
        env:
          NEXT_PUBLIC_ROSBRIDGE_URL: ws://localhost:9090

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 – Docker image (for web / self-hosted deployment)
  # ────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t miti:${{ github.ref_name }} .
          docker save miti:${{ github.ref_name }} | gzip > miti-docker-${{ github.ref_name }}.tar.gz
          echo "✅ Docker image saved"
          ls -lh miti-docker-*.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: miti-docker-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 – Create GitHub Release (after all builds succeed)
  # ────────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [electron, docker]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: |
          echo "📦 Files to release:"
          find release-artifacts -type f | sort

      - name: Generate Release Notes
        run: |
          cat > RELEASE_NOTES.md << 'NOTES'
          ## 🚀 MITI ${{ github.ref_name }}

          ### 📦 Download Options

          #### Desktop App (Electron)

          | Platform | File | Notes |
          |----------|------|-------|
          | **macOS** (Intel) | `MITI-*.dmg` | Double-click to install |
          | **macOS** (Apple Silicon) | `MITI-*-arm64.dmg` | Double-click to install |
          | **Windows** | `MITI-*-Setup.exe` | Run the installer |
          | **Ubuntu / Linux** | `MITI-*.deb` | `sudo dpkg -i MITI-*.deb` |
          | **Linux (portable)** | `MITI-*.AppImage` | `chmod +x` then run directly |

          #### Docker Image (Web Deployment)
          - **File**: `miti-docker-${{ github.ref_name }}.tar.gz`
          ```bash
          # Load
          docker load < miti-docker-${{ github.ref_name }}.tar.gz
          # Run
          docker run -d -p 3000:3000 \
            -e NEXT_PUBLIC_ROSBRIDGE_URL=ws://your-robot:9090 \
            --name miti miti:${{ github.ref_name }}
          ```

          ### 📝 What's Changed

          NOTES

          # Append commit log
          if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
            git log "$(git describe --tags --abbrev=0 HEAD^)"..HEAD \
              --pretty=format:"* %s (%h)" >> RELEASE_NOTES.md
          else
            git log --pretty=format:"* %s (%h)" >> RELEASE_NOTES.md
          fi

          cat >> RELEASE_NOTES.md << 'FOOTER'

          ### 🔗 Links
          - [Documentation](https://github.com/hiran-t/MITI/blob/main/README.md)
          - [Deployment Guide](https://github.com/hiran-t/MITI/blob/main/docs/DEPLOYMENT.md)
          FOOTER

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: release-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 – Push to Docker Hub (disabled by default)
  # ────────────────────────────────────────────────────────────────────────────
  docker-hub:
    name: Push to Docker Hub (Optional)
    runs-on: ubuntu-latest
    needs: create-release
    if: false  # Set to true and configure DOCKER_USERNAME / DOCKER_PASSWORD secrets to enable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: yourusername/miti
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
