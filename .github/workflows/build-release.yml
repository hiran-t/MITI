name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Check if version changed → decide whether to release
  # ──────────────────────────────────────────────────────────────────────────────
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      tag: ${{ steps.pkg.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG is new — will create release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────────────────────────────────────
  # Build Electron app on each platform
  # ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build – ${{ matrix.platform }}
    needs: [check-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            script: electron:build:mac
            artifact-name: electron-macos
            artifact-path: |
              dist-electron/*.dmg

          - platform: Windows
            os: windows-latest
            script: electron:build:win
            artifact-name: electron-windows
            artifact-path: dist-electron/*Setup*.exe

          - platform: Linux
            os: ubuntu-latest
            script: electron:build:linux
            artifact-name: electron-linux
            artifact-path: |
              dist-electron/*.deb
              dist-electron/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run ${{ matrix.script }}
        env:
          NEXT_PUBLIC_ROSBRIDGE_URL: ws://localhost:9090

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Auto-tag + Create GitHub Release (only when version in package.json changes)
  # ──────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.should_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create git tag
        run: |
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Generate release notes
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          VERSION="${{ needs.check-version.outputs.version }}"

          cat > RELEASE_NOTES.md << 'NOTES'
          ## MITI $TAG

          ### Download Options

          | Platform | File | Install |
          |----------|------|---------|
          | **macOS** (Intel) | `MITI-*.dmg` | Double-click to install |
          | **macOS** (Apple Silicon) | `MITI-*-arm64.dmg` | Double-click to install |
          | **Windows** | `MITI-*-Setup.exe` | Run the installer |
          | **Ubuntu / Linux** | `MITI-*.deb` | `sudo dpkg -i MITI-*.deb` |
          | **Linux (portable)** | `MITI-*.AppImage` | `chmod +x` then run |

          ### What's Changed

          NOTES

          # Replace $TAG placeholder
          sed -i "s/\$TAG/${TAG}/g" RELEASE_NOTES.md

          # Append commit log since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..${TAG}" --pretty=format:"* %s (%h)" >> RELEASE_NOTES.md
          else
            git log --pretty=format:"* %s (%h)" -20 >> RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: MITI ${{ needs.check-version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
